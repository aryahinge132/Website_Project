<!DOCTYPE html>
<html>
<head>
<title>Event Management</title>
<link rel="stylesheet" href="event.css">
</head>

<body>

<!-- Banner -->
<header class="banner">
    <h1>EVENT FEST 2026</h1>
    <p>Celebrate • Connect • Enjoy</p>
    <a href="#register" class="btn">Register Now</a>
</header>

<!-- Upcoming Events -->
<section class="events">
    <h2>Upcoming Events</h2>

    <div class="card-container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329">
            <h3>Music Night</h3>
            <p>25 June 2026</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511578314322-379afb476865">
            <h3>Fashion Show</h3>
            <p>10 July 2026</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">
            <h3>Business Meetup</h3>
            <p>20 July 2026</p>
        </div>

    </div>
</section>

<!-- Registration -->
<section class="register" id="register">

<h2>Registration Form</h2>

<form>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="number" placeholder="Phone Number">

<select>
<option>Select Event</option>
<option>Music Night</option>
<option>Fashion Show</option>
<option>Business Meetup</option>
</select>

<button>Submit</button>

</form>

</section>

<!-- Gallery -->

<section class="gallery">

<h2>Gallery</h2>

<div class="gallery-box">

<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f">

<img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3">

<img src="https://images.unsplash.com/photo-1496024840928-4c417adf211d">

<img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94">

</div>

</section>

<!-- Footer -->

<footer>

<h3>Event Management</h3>

<p>Email: event@gmail.com</p>

<p>Phone: +91 9876543210</p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>
</html>
